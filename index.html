<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AEMS Dex — Dallas 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1420; --bg2:#0A0F18; --surface:#161E2E; --surface2:#1C2638;
  --line:#26334A; --line2:#33445F;
  --copper:#E0935A; --copper-dim:#9A6238; --copper-glow:rgba(224,147,90,.16);
  --cyan:#4FD1C5; --cyan-dim:#2C7A73;
  --green:#5FCB7E; --amber:#E7C15A; --violet:#9A8CF0; --rose:#E07A8B;
  --text:#EAEFF7; --muted:#8A97AD; --muted2:#5C6B83;
  --r:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1100px 600px at 80% -8%, #16213a 0%, transparent 55%),
             radial-gradient(900px 500px at -10% 10%, #14202f 0%, transparent 50%), var(--bg);
  color:var(--text); font-family:Inter,system-ui,sans-serif; line-height:1.45;
  padding-bottom:90px; min-height:100vh;
}
.wrap{max-width:780px;margin:0 auto;padding:0 14px}
/* PCB trace top texture */
.topband{height:3px;background:linear-gradient(90deg,var(--copper) 0%,var(--cyan) 50%,var(--copper) 100%);opacity:.8}

header{padding:20px 0 8px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--copper);font-weight:500}
h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;line-height:1.02;margin:6px 0 4px;letter-spacing:-.01em}
.sub{color:var(--muted);font-size:13.5px}
.sub b{color:var(--text);font-weight:600}

/* view toggle */
.viewtoggle{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:5px;margin:16px 0 14px;position:sticky;top:8px;z-index:40;backdrop-filter:blur(8px)}
.viewtoggle button{flex:1;border:0;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;padding:9px;border-radius:8px;cursor:pointer;transition:.15s}
.viewtoggle button.on{background:linear-gradient(180deg,var(--surface2),#141d2c);color:var(--text);box-shadow:0 1px 0 var(--line2) inset, 0 4px 12px rgba(0,0,0,.3)}

/* filter bar */
.tools{margin-bottom:12px}
.search{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:11px;color:var(--text);padding:12px 14px;font-size:15px;font-family:Inter}
.search::placeholder{color:var(--muted2)}
.search:focus{outline:none;border-color:var(--cyan-dim);box-shadow:0 0 0 3px rgba(79,209,197,.12)}
.chips{display:flex;gap:7px;overflow-x:auto;padding:11px 0 3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.fchip{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;font-family:'JetBrains Mono',monospace;letter-spacing:.02em}
.fchip.on{color:var(--bg);background:var(--copper);border-color:var(--copper)}
.fchip.on.cyan{background:var(--cyan);border-color:var(--cyan)}
.count{color:var(--muted2);font-size:11.5px;font-family:'JetBrains Mono',monospace;margin:2px 2px 10px}

/* grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{position:relative;background:linear-gradient(165deg,var(--surface) 0%,#12192699 100%);border:1px solid var(--line);border-radius:var(--r);padding:13px 12px 12px;cursor:pointer;overflow:hidden;transition:transform .12s,border-color .15s}
.card:active{transform:scale(.975)}
.card .dex{position:absolute;top:9px;right:11px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted2);letter-spacing:.05em}
.card .av{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--text);background:linear-gradient(140deg,var(--surface2),#0e1623);border:1px solid var(--line2);margin-bottom:9px}
.card .nm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;line-height:1.12;margin-bottom:2px}
.card .org{font-size:11.5px;color:var(--cyan);font-weight:600;margin-bottom:5px}
.card .ti{font-size:11px;color:var(--muted);line-height:1.25;height:28px;overflow:hidden}
.card .foot{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.tag{font-size:9.5px;font-family:'JetBrains Mono',monospace;font-weight:500;padding:2.5px 7px;border-radius:6px;letter-spacing:.03em;text-transform:uppercase}
.tag.mine{background:var(--copper-glow);color:var(--copper);border:1px solid var(--copper-dim)}
.tag.spk{background:rgba(154,140,240,.14);color:var(--violet);border:1px solid #4d4585}
.tag.cust{background:rgba(95,203,126,.13);color:var(--green);border:1px solid #2f6b41}
.tag.book{background:rgba(231,193,90,.13);color:var(--amber);border:1px solid #7a661f}
/* tier accents */
.card.t1{border-color:var(--copper-dim)}
.card.t1:before{content:"";position:absolute;inset:0;border-radius:var(--r);box-shadow:0 0 0 1px var(--copper-dim) inset, 0 0 22px -6px var(--copper-glow);pointer-events:none}
.card.t1 .av{border-color:var(--copper-dim);color:var(--copper);background:linear-gradient(140deg,#241a12,#15110b)}
.card.t2 .av{border-color:var(--copper-dim)}
.card.t3{border-color:#2f6b41aa}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(5,8,13,.74);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.scrim.open{display:flex}
.sheet{background:var(--bg);border:1px solid var(--line2);border-bottom:0;border-radius:20px 20px 0 0;width:100%;max-width:780px;max-height:92vh;overflow-y:auto;padding:0 0 28px;animation:rise .26s cubic-bezier(.2,.8,.2,1)}
@media(min-width:560px){.scrim{align-items:center}.sheet{border-radius:20px;border-bottom:1px solid var(--line2);max-height:88vh}}
@keyframes rise{from{transform:translateY(28px);opacity:.6}to{transform:translateY(0);opacity:1}}
.grab{width:38px;height:4px;background:var(--line2);border-radius:99px;margin:9px auto 2px}
.shead{padding:14px 18px 16px;border-bottom:1px solid var(--line);position:relative}
.shead .x{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:17px;cursor:pointer;line-height:1}
.shead .row{display:flex;gap:13px;align-items:center}
.shead .bigav{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:23px;flex:0 0 auto;border:1px solid var(--line2);background:linear-gradient(140deg,var(--surface2),#0e1623)}
.shead h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;margin:0 0 2px;letter-spacing:-.01em;padding-right:30px}
.shead .stitle{font-size:13px;color:var(--muted);line-height:1.3}
.shead .sorg{font-size:13px;color:var(--cyan);font-weight:600;margin-top:3px}
.sbadges{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}

.sect{padding:15px 18px;border-bottom:1px solid var(--line)}
.sect:last-child{border-bottom:0}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--copper);margin-bottom:9px;font-weight:500}
.kv{display:flex;gap:8px;font-size:13.5px;margin-bottom:6px;align-items:baseline}
.kv .k{color:var(--muted2);font-family:'JetBrains Mono',monospace;font-size:11px;min-width:78px;flex:0 0 auto;text-transform:uppercase;letter-spacing:.04em;padding-top:1px}
.kv .v{color:var(--text)}
.kv .v a{color:var(--cyan);text-decoration:none}
.body{font-size:14px;color:#cdd6e4;line-height:1.55}
.body.warm{color:#f0d9c4}
.angle{background:linear-gradient(165deg,#241a1233,#15110b22);border:1px solid var(--copper-dim);border-radius:12px;padding:13px 14px;font-size:14px;color:#f0dbc7;line-height:1.55}
.angle .lbl{color:var(--copper)}
.invlist{display:flex;flex-wrap:wrap;gap:6px}
.ichip{font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--surface);border:1px solid var(--line);color:var(--muted);padding:4px 9px;border-radius:7px}
.bullets{margin:0;padding-left:16px;font-size:13.5px;color:#cdd6e4;line-height:1.5}
.bullets li{margin-bottom:5px}
.opp{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px}
.opp .on{font-weight:600;font-family:'Space Grotesk',sans-serif;font-size:13.5px}
.opp .od{color:var(--muted);font-size:11.5px;font-family:'JetBrains Mono',monospace;margin-top:3px}
.spk{background:rgba(154,140,240,.08);border:1px solid #4d458566;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.spk .st{font-weight:600;font-size:13px;font-family:'Space Grotesk',sans-serif}
.spk .sm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--violet);margin-top:3px}

/* GAME PLAN */
.gp{display:none}
.gp.on{display:block}
.gview .grid,.gview .tools{display:none}
.banner{background:linear-gradient(160deg,#1a2740,#10182600);border:1px solid var(--line2);border-radius:16px;padding:16px;margin-bottom:14px}
.banner h3{font-family:'Space Grotesk',sans-serif;margin:0 0 8px;font-size:17px}
.banner .mini{display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.banner .mini b{color:var(--copper);font-weight:600}
.gsec-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;margin:22px 2px 12px;display:flex;align-items:center;gap:9px}
.gsec-title .dot{width:8px;height:8px;border-radius:99px;background:var(--copper)}
.hit{background:linear-gradient(165deg,var(--surface),#12192699);border:1px solid var(--copper-dim);border-radius:14px;padding:14px;margin-bottom:11px;position:relative}
.hit:before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--copper)}
.hit .hh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.hit .hn{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px}
.hit .ho{font-size:12px;color:var(--cyan);font-weight:600;margin-top:1px}
.hit .hti{font-size:12px;color:var(--muted);margin-top:2px}
.hit .when{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber);background:rgba(231,193,90,.1);border:1px solid #7a661f;padding:4px 8px;border-radius:7px;white-space:nowrap;flex:0 0 auto}
.hit .why{font-size:13px;color:#d9cdbf;margin-top:9px;line-height:1.5}
.hit .opencard{margin-top:9px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--copper);cursor:pointer;border:1px solid var(--copper-dim);border-radius:7px;padding:5px 9px;display:inline-block}
.tcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:0;margin-bottom:9px;overflow:hidden}
.tcard .tt{padding:11px 13px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;background:var(--bg2)}
.tcard .tt .dy{color:var(--cyan)}
.slot{padding:11px 13px;border-bottom:1px solid var(--line);display:flex;gap:11px}
.slot:last-child{border-bottom:0}
.slot .tm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber);flex:0 0 70px;padding-top:1px}
.slot .sc{font-size:13.5px}
.slot .sc .sn{font-weight:600;font-family:'Space Grotesk',sans-serif}
.slot .sc .sd{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.4}
.slot.key{background:linear-gradient(90deg,var(--copper-glow),transparent)}
.slot.key .tm{color:var(--copper)}
.slot.net{background:rgba(79,209,197,.05)}
.slot.net .tm{color:var(--cyan)}
.who{display:inline-block;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--copper);background:var(--copper-glow);border:1px solid var(--copper-dim);padding:2px 7px;border-radius:6px;margin:4px 4px 0 0}
.foot-note{color:var(--muted2);font-size:11.5px;text-align:center;padding:22px 10px 4px;font-family:'JetBrains Mono',monospace;line-height:1.6}
.legend{display:flex;gap:13px;flex-wrap:wrap;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin:2px 2px 12px}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block}

.card.ph{border-style:dashed;border-color:var(--line2);opacity:.94}
.card.ph .av{border-style:dashed;color:var(--muted)}
.tag.tbd{background:rgba(231,193,90,.12);color:var(--amber);border:1px dashed #7a661f}
.tag.pub{background:rgba(79,209,197,.12);color:var(--cyan);border:1px solid var(--cyan-dim)}
</style>
</head>

<div class="topband"></div>
<div class="wrap">
  <header>
    <div class="eyebrow">Planview Field Intel · Booth #8</div>
    <h1>AEMS Dex</h1>

  <div class="viewtoggle">

  <!-- DEX VIEW -->
  <div id="dexview">

    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- GAME PLAN VIEW -->
  <div id="planview" class="gp"></div>
</div>

<div class="scrim" id="scrim" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

  const s=slug(p.name), cls=big?'bigav':'av';
  const style=big&&p.isKush?" style=\"border-color:var(--copper-dim);color:var(--copper)\"":(p.isKush&&!big?'':'');

function chipHtml(){
  return FILTERS.map(f=>`<div class="fchip ${filter===f[0]?'on':''} ${f[0]==='speaking'?'':''}" onclick="setFilter('${f[0]}')">${f[1]}</div>`).join('');

    h+=`<div class="sect"><div class="lbl">Company intel · ${esc(p.company)}</div>`;

    h+=`<div class="body" style="margin-bottom:10px">${esc(r.financials)}</div>`;
    h+=`<ul class="bullets">`+r.strategic.map(x=>`<li>${esc(x)}</li>`).join('')+`</ul>`;
    h+=`</div>`;
    h+=`<div class="sect"><div class="angle"><div class="lbl">Your angle</div>${esc(r.angle)}</div></div>`;
  }

  if(p.slackNote){
    h+=`<div class="sect"><div class="lbl">Team note (Slack)</div><div class="body" style="font-size:13px">${esc(p.slackNote)}</div></div>`;
  }

  if(p.challenges){
    h+=`<div class="sect"><div class="lbl">Stated challenges</div><div class="body" style="font-size:13.5px">${esc(p.challenges)}</div></div>`;
  }
  if(p.invest.length){
    h+=`<div class="sect"><div class="lbl">Investment areas</div><div class="invlist">`+p.invest.map(i=>`<span class="ichip">${esc(i)}</span>`).join('')+`</div></div>`;
  }

  document.getElementById('sheet').innerHTML=h;
  document.getElementById('sheet').scrollTop=0;
  document.getElementById('scrim').classList.add('open');
  document.body.style.overflow='hidden';
}
function kv(k,v){return `<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`}
function closeSheet(){document.getElementById('scrim').classList.remove('open');document.body.style.overflow=''}

function buildPlan(){
  const mine=P.filter(p=>p.isKush).sort((a,b)=>a.tier-b.tier||a.dex-b.dex);
  const whyMap={
   'Sridhar Chatradhi':'On stage Day 1, 2:20 PM. WD is pure greenfield (no history) riding a sold-out AI storage ramp — lead with scaling program capacity to a capacity-locked roadmap.',
   'Liming Wang':'Roundtable + panel Day 2. Onsemi is a former customer in an inflection quarter (FabRite restructuring + Treo/GaN ramps). VP Mfg Finance — talk portfolio rationalization, not PPM.',
   'Aaron Scroggin':'Panel Day 2, 2:15 PM. Intel re-engagement is live with 3 open opps incl. Foundry new-logo. Quality & Reliability sits where 18A yield + program execution meet.',
   'Oleh Karpenko':'Meeting already booked (flagged "too manufacturing focused" — reframe to NPD/portfolio). SVP, most senior Onsemi contact on site.',
   'Preeti Prasher':'Book time. Synaptics is a current Hub customer (Jama+Jira) — she is VP Ops, NPI Engineering, the exact expansion buyer as Astra design wins accelerate.',
   'Cathy Xu':'AMD prospect, you own outreach. AMD is in a data-center inflection with a TSMC-capacity-constrained ramp — delivery predictability at scale.',
   'Glenn Hafer':'Skyworks customer (floor). Account shrank from $897K to ~$75K; FY27 renewal ($88,250) is open and the Qorvo merger is a portfolio-integration reason to expand back up.',
  };
  let h=`<div class="banner">
    <h3>Your two days, optimized for catching people</h3>
    <div class="mini"><span><b>${mine.length}</b> contacts across your 6 accounts</span><span><b>3</b> on stage</span><span><b>Booth #8</b></span><span>Workshop <b>Day 1 12:05</b></span></div>
  </div>`;

  // hit list — speakers + booked + senior, tier order
  h+=`<div class="gsec-title"><span class="dot"></span>Priority hit list</div>`;
  const order=['Sridhar Chatradhi','Aaron Scroggin','Liming Wang','Oleh Karpenko','Preeti Prasher','Cathy Xu','Glenn Hafer'];
  order.forEach(nm=>{
    const p=mine.find(x=>x.name===nm); if(!p)return;
    let when = p.speaking.length? p.speaking[0].time : ((p.meeting||'').toLowerCase().includes('book')?'1-2-1 block':'Networking');
    h+=`<div class="hit">
      <div class="hh"><div><div class="hn">${esc(p.name)}</div><div class="ho">${esc(p.company)} · ${esc(p.cp||'')}</div><div class="hti">${esc(p.title)}</div></div>
      <div class="when">${esc(when)}</div></div>
      <div class="why">${esc(whyMap[nm]||'')}</div>
      <span class="opencard" onclick="event.stopPropagation();openSheet(${p.dex})">Open full card →</span>
    </div>`;
  });

  // remaining mine
  const rest=mine.filter(p=>!order.includes(p.name));
  if(rest.length){
    h+=`<div class="gsec-title"><span class="dot" style="background:var(--cyan)"></span>Also yours on site</div>`;
    rest.forEach(p=>{
      h+=`<div class="tcard"><div class="slot" onclick="openSheet(${p.dex})" style="cursor:pointer"><div class="tm" style="color:var(--cyan)">${esc(p.company.split(' ')[0])}</div><div class="sc"><div class="sn">${esc(p.name)}</div><div class="sd">${esc(p.title)} · ${esc(p.meeting||'floor/networking')}</div></div></div></div>`;
    });
  }

  // schedule
  h+=`<div class="gsec-title"><span class="dot"></span>Where to be</div>`;
  for(const day in AGENDA){
    h+=`<div class="tcard"><div class="tt"><span class="dy">${esc(day)}</span><span>CST</span></div>`;
    AGENDA[day].forEach(s=>{
      h+=`<div class="slot ${s[1]}"><div class="tm">${esc(s[0])}</div><div class="sc"><div class="sn">${esc(s[2])}</div>${s[3]?`<div class="sd">${esc(s[3])}</div>`:''}</div></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="foot-note">Pre-event happy hour: Sun Jun 15, 6:00–7:00 PM<br>Booth #8 load-out: Tue Jun 17, 2:00–5:00 PM<br>Built from SFDC + delegate list + agenda · ${esc(DATA.generated)}</div>`;
  document.getElementById('planview').innerHTML=h;
}

function setView(v){
  const dex=v==='dex';
  document.getElementById('dexview').style.display=dex?'block':'none';
  document.getElementById('planview').classList.toggle('on',!dex);
  document.getElementById('vb-dex').classList.toggle('on',dex);
  document.getElementById('vb-plan').classList.toggle('on',!dex);
  window.scrollTo(0,0);
}

render();
buildPlan();
</script>
